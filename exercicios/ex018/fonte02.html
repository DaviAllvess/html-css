<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:'Love';
            src: url('fontes/love\ larry.otf.otf') format('opentype'), url('fontes/love/ larry.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body{
            font-family: 'Times New Roman', Times, serif;
        }

        h1{
            font-family: 'love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
        
        p
        {
            font-family:'Love';
            src: url('fontes/love\ larry.otf.otf') format('opentype'), url('fontes/love/ larry.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium veniam nihil nisi blanditiis, placeat corporis nostrum temporibus. Tempore aliquam cupiditate, autem, incidunt odit voluptatum a hic perspiciatis esse pariatur illum.</p>

</html>
